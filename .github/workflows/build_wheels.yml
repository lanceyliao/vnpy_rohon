name: Build Wheels (Windows + Ubuntu amd64/arm64)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.os }} py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip and install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build wheel setuptools

      - name: Set up MSVC dev environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build wheel (Linux)
        if: runner.os == 'Linux'
        run: |
          python -m build --wheel

      - name: Build wheel (Windows, MSVC)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          CC: cl
          CXX: cl
        run: |
          python -m build --wheel

      - name: Validate Linux wheel exists
        if: runner.os == 'Linux'
        run: |
          ls -la dist
          test -n "$(ls dist/*.whl)"

      - name: Validate Windows wheel exists
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-ChildItem -Path dist
          if (-not (Get-ChildItem -Path dist -Filter *.whl)) {
            throw "No wheel generated in dist/"
          }

      - name: Upload build artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: vnpy_rohon-windows-${{ runner.arch }}-py${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error

      - name: Upload build artifacts (Ubuntu)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: vnpy_rohon-ubuntu-${{ runner.arch }}-py${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error
